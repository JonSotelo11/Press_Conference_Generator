            function createCSV(csv_data, csv_schedule_data){
                const blob = new Blob([csv_data.join('\n')], { type: 'text/csv'}); 
                const blob2 = new Blob([csv_schedule_data.join('\n')], {type: 'text/csv'});

    
                // Creating an object for downloading url 
                const url = window.URL.createObjectURL(blob) 
                const url2 = window.URL.createObjectURL(blob2) 
                // Creating an anchor(a) tag of HTML 
                const a = document.createElement('a') 
                const a2 = document.createElement('a') 
                // Passing the blob downloading url  
                a.setAttribute('href', url) 
                a2.setAttribute('href', url2)
                // Setting the anchor tag attribute for downloading 
                // and passing the download file name 
                a.setAttribute('download', 'gms_data.csv'); 
                a2.setAttribute('download', 'master_schedule_data.csv'); 
                // Performing a download with click 
                a.click(); 
                a2.click();
                URL.revokeObjectURL(url);
                URL.revokeObjectURL(url2);
                a.remove();
                a2.remove();
            }

            //function passed to use as a function call back for filter method above for the array chosen
            function checkDate(date){
                //turn the gameDate key from a date string to a timestamp to check against start/end timestamps values from html input element
                let parsed_date = Date.parse(date.gameDate);
                const filter_start_date = document.getElementById("start").valueAsNumber;
                const filter_end_date = document.getElementById("end").valueAsNumber;

                //had to convert from time stamp to date because values were off by one
                //something to do with the inherent html valueAsNumber built in timestamp conversion? or the timestamp from schedule response is off
                //https://stackoverflow.com/a/9509687 for reference
                let d_end = new Date(filter_end_date);
                let d_start = new Date(filter_start_date);
                d_end.setDate(d_end.getDate()+ 1);
                //did not apply the +1 to the start time as that was off by one which would self resolve by keeping the same
                d_start.setDate(d_start.getDate());
                
                return (parsed_date >= d_start.getTime() && parsed_date <= d_end.getTime());
            }

            function calculateEncoder(awayTri, homeTri, id, data){
                
                let National = false,
                    Home = false,
                    Away = false,
                    natEncoder = "",
                    homeEncoder = "",
                    awayEncoder = "",
                    json_data = {};

                /*
                Searches medias for the given day and determines National, Home, and Away encoders solely on if the gameID from the media
                matches the gameID provided to the function in the call. 
                */
                for(let media of data){
                    //Check if the current media's Game ID in the data matches the Game ID we're searching through
                    //True -> Continue checks ; False -> Move on to the next imedia in the list
                    if(media.gameId == id){
                        //Every if statement in this nested section will check if the current media is a National, Home, or Away.
                        //Seperated by If statements as a measure to force each one to run
                        //Bool values that are being checked against will be adjusted to True if the media is confirmed National/Home/Away in order to avoid a rerun of the logic
                        //AKA if True, we have the National encoder, so skip the encoder check on next successful passes
                        if(!National){
                            //Checks against a predefined list of National media names that would match with the mediaName provided by the data. Change value to True if found, leave False otherwise
                            National = natMedias.includes(media.mediaFullName);
                            //If the Bool value is True (media matches to a national media), set the encoder value to the value in the current data
                            //If false, leave encoder value empty
                            natEncoder = (National) ? media.encoder : "";
                        }
                        if(!Home){
                            Home = media.mediaFullName.includes("NSS-Team-"+media.homeTeamAbbr);
                            homeEncoder = (Home) ? media.encoder :"";
                        }
                        if(!Away){
                            Away = media.mediaFullName.includes("NSS-Team-"+media.awayTeamAbbr);
                            awayEncoder = (Away) ? media.encoder :"";
                        }
                    
                    }
                }

                if(Home && Away){
                    json_data["awayEncoder"] = awayEncoder;
                    json_data["homeEncoder"] = homeEncoder;
                    
                }
                else if (National && !Away){
                    json_data["awayEncoder"] = natEncoder;
                    json_data["homeEncoder"] = teamEncoders[homeTri];
                  
                }
                else if(National && !Home){
                    json_data["awayEncoder"] = awayEncoder;
                    json_data["homeEncoder"] = natEncoder;
                   
                }
                
                return json_data;
            }

            //function to return callback
            getGMSData = function(url, sDate, eDate, seasonID, callback){
                var xhttp = new XMLHttpRequest();
                xhttp.onreadystatechange = function() {
                    if (this.readyState == 4 && this.status == 200) {
                        let res = this.responseText;
                        
                        callback(JSON.parse(res));
                    }
                };
                xhttp.open("GET", url +`?startDate=${sDate}&endDate=${eDate}&seasonID=${seasonID}`, true);
                xhttp.send();
            }

            getFileData = function(event, callback){
                let fileReader = new FileReader();
                fileReader.onload = function(){
                    //console.log("getFileData" + "\n" + fileReader.result);
                    callback(fileReader.result);
                }
                fileReader.readAsText(event.files[0]);
            }
        
            function bubbleSort(res){
            //bubblesort GMS data cause it doesn't load in order........
                var list = res;
                var x, y, temp;
                var swap;
                
                
                for(x = 0; x < list.length; x++){
                    swap = false;
                    for(y = 0; y < list.length - x - 1; y++){
                        let sortKey = "dateTimeUtc";
                        let sortKey2 = "dateTimeUtc";

                        if(list[y].dateTimeUtc == null)
                            sortKey = "dateEst"
                        if(list[y+1].dateTimeUtc == null)
                            sortKey2 = "dateEst"

                        if(list[y][sortKey] > list[y+1][sortKey2]){
                            temp = list[y];
                            list[y] = list[y +1];
                            list[y+1] = temp;
                            swap = true;
                        }
                }
                if(swap == false)
                    break;
                }
                return list;
            //end bubblesort
            }
